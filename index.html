<html lang="nl">
  <head>
    <meta charset="UTF-8" />

  <body>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script type="text/babel" data-presets="react">


const B = {
  bordeaux: "#650D17",
  goud:     "#9F926A",
  goudLight:"#c4b48a",
  creme:    "#E2DAC8",
  cremeDark:"#cfc5ae",
  wit:      "#FAF7F2",
  tekst:    "#2e1f14",
  sub:      "#7a6555",
};

const FUNCTIES = {
  bereiken:  { kleur: "#4a7c59", label: "Bereiken",  icon: "📡" },
  verbinden: { kleur: "#9F926A", label: "Verbinden", icon: "🤝" },
  activeren: { kleur: "#c47a2a", label: "Activeren", icon: "⚡" },
  verkopen:  { kleur: "#650D17", label: "Verkopen",  icon: "💳" },
};

// Type → primaire functie mapping
const TYPE_FUNCTIE = {
  "IG-reel":                { primair: "bereiken",  secundair: "verbinden" },
  "Instagram-carrousel":    { primair: "verbinden", secundair: "activeren" },
  "Instagram-afbeelding":   { primair: "verbinden", secundair: "bereiken"  },
};

function parseCSV(text) {
  const results = [];
  let cur = "", inQuotes = false, row = [];
  const clean = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  for (let i = 0; i <= clean.length; i++) {
    const ch = clean[i];
    if (i === clean.length) { row.push(cur.trim()); if (row.some(v => v)) results.push(row); break; }
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === "," && !inQuotes) { row.push(cur.trim()); cur = ""; }
    else if (ch === "\n" && !inQuotes) { row.push(cur.trim()); if (row.some(v => v)) results.push(row); row = []; cur = ""; }
    else { cur += ch; }
  }
  return results;
}

function analyseerCSV(inhoud) {
  const parsed = parseCSV(inhoud);
  if (parsed.length < 2) return null;

  const headers = parsed[0].map(h => h.toLowerCase().replace(/['"]/g, "").replace(/^\uFEFF/, "").trim());
  const rows = parsed.slice(1).map(vals => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || "").replace(/^"|"$/g, "").trim(); });
    return obj;
  }).filter(r => Object.values(r).some(v => v));

  const find = (keys) => headers.find(h => keys.some(k => h.includes(k))) || null;
  const bereikCol   = find(["bereik"]);
  const savesCol    = find(["opgeslagen"]);
  const commentsCol = find(["opmerkingen"]);
  const likesCol    = find(["vind-ik-leuks", "likes"]);
  const typeCol     = find(["berichttype", "type"]);
  const beschCol    = find(["omschrijving", "beschrijving", "caption"]);

  const tijdCol = find(["publicatietijdstip", "tijdstip", "datum", "date", "published", "time"]);

  const toN = (v) => parseFloat((v || "0").replace(/[^0-9.,]/g, "").replace(",", ".")) || 0;

  const parseDate = (v) => {
    if (!v) return null;
    // MM/DD/YYYY HH:MM or YYYY-MM-DD
    const m1 = v.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})/);
    if (m1) return new Date(+m1[3], +m1[1]-1, +m1[2], +m1[4], +m1[5]);
    const m2 = v.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (m2) return new Date(+m2[1], +m2[2]-1, +m2[3]);
    return null;
  };

  let totBereik = 0, totSaves = 0, totComments = 0;
  let topPost = null, topScore = 0;
  const typeStats = {};
  const allePostsGescoord = [];
  const dagStats  = {}; // 0=zo..6=za
  const uurStats  = {};
  const weekStats = {};
  const captionStats = { kort: {b:0,s:0,n:0}, middel: {b:0,s:0,n:0}, lang: {b:0,s:0,n:0} };
  const DAGEN_NL = ["Zo","Ma","Di","Wo","Do","Vr","Za"];

  rows.forEach(r => {
    const bereik   = bereikCol   ? toN(r[bereikCol])   : 0;
    const saves    = savesCol    ? toN(r[savesCol])    : 0;
    const comments = commentsCol ? toN(r[commentsCol]) : 0;
    const likes    = likesCol    ? toN(r[likesCol])    : 0;
    const type     = typeCol     ? r[typeCol] : "post";
    const score    = bereik + saves * 3 + comments * 2 + likes;
    const tekst    = beschCol    ? r[beschCol] : "";

    totBereik += bereik; totSaves += saves; totComments += comments;

    if (!typeStats[type]) typeStats[type] = { bereik:0, saves:0, comments:0, likes:0, count:0 };
    typeStats[type].bereik += bereik; typeStats[type].saves += saves;
    typeStats[type].comments += comments; typeStats[type].likes += likes;
    typeStats[type].count += 1;

    allePostsGescoord.push({ bereik, saves, comments, likes, type, score, tekst });
    if (score > topScore) { topScore = score; topPost = { bereik, saves, comments, likes, type, tekst }; }

    // Content type detectie — scoring-based (niet volgorde-afhankelijk)
    const t = tekst.toLowerCase();
    const scores = {
      "Klantverhaal": 0,
      "HOT Lead":     0,
      "Visie":        0,
      "Persoonlijk":  0,
      "Rolmodel":     0,
      "Help":         0,
      "Hub":          0,
    };

    // KLANTVERHAAL — klant als HOOFDONDERWERP, minimaal 2 sterke signalen nodig
    // Sterke signalen: klant als handelend subject met resultaat
    if (/\btoen (ze|hij) bij me (kwam|kwamen)\b/.test(t)) scores["Klantverhaal"] += 6;
    if (/\b(mijn klant|een klant van me|een van mijn klanten)\b/.test(t)) scores["Klantverhaal"] += 5;
    if (/\bze (verdiende|haalde|deed|draaide|bouwde|realiseerde|verdubbelde)\b/.test(t) && /\b\d/.test(t)) scores["Klantverhaal"] += 5;
    if (/\bhij (verdiende|haalde|deed|draaide|bouwde|realiseerde|verdubbelde)\b/.test(t) && /\b\d/.test(t)) scores["Klantverhaal"] += 5;
    if (/\b(ze|hij) (stapte|startte|besloot|ging)\b/.test(t) && /\b(bij me|met me|in het programma|in de club)\b/.test(t)) scores["Klantverhaal"] += 4;
    if (/\b(haar|zijn) (bedrijf|omzet|leven|resultaat)\b/.test(t) && /\b\d/.test(t)) scores["Klantverhaal"] += 3;
    // Zwakke signalen (ze/hij alleen is niet genoeg)
    if (/\bze (deed|ging|had|werkte|zat|maakte)\b/.test(t)) scores["Klantverhaal"] += 1;
    if (/\bhij (deed|ging|had|werkte|zat|maakte)\b/.test(t)) scores["Klantverhaal"] += 1;
    // Bescherming: post gaat over IK → geen klantverhaal
    if (/\b(mijn omzet|mijn bedrijf|ik verdien|ik haalde|ik verdubbelde|mijn jaar|dit jaar (komt|is|werd)|ik verwed)\b/.test(t)) scores["Klantverhaal"] -= 5;
    if (/^(ik |dit jaar |afgelopen jaar |vorig jaar )/.test(t)) scores["Klantverhaal"] -= 2;

    // HOT LEAD — duidelijke CTA naar actie, DM, comment, weggever, aanbod
    if (/\b(comment|reageer|dm|stuur me|stuur een|meld je aan|wachtlijst|schrijf je in|klik op de link|link in bio|swipe up)\b/.test(t)) scores["HOT Lead"] += 5;
    if (/\b(ik zoek|ik heb nog|nog \d+ plekken|plekken vrij|gratis|weggever|download|audio|masterclass|training)\b/.test(t)) scores["HOT Lead"] += 3;
    if (/\b(wil jij|wil je ook|klinkt dit als jou|herken je dit)\b/.test(t)) scores["HOT Lead"] += 2;
    // Bescherming: als tekst een verhaal vertelt zonder CTA-taal, geen HOT Lead
    if (/\b(ze deed|ze ging|hij deed|hij ging|toentertijd|destijds)\b/.test(t)) scores["HOT Lead"] -= 3;

    // VISIE — standpunt, mening over de markt, confronterend
    if (/\b(stop met|de markt|iedereen (zegt|denkt|doet)|de meeste ondernemers|de industrie|het systeem)\b/.test(t)) scores["Visie"] += 4;
    if (/\b(waarheid|illusie|leugen|mythe|het klopt niet|dat werkt niet|niemand vertelt je)\b/.test(t)) scores["Visie"] += 3;
    if (/\b(ik geloof|ik denk|ik vind|mijn mening|mijn visie|mijn standpunt)\b/.test(t)) scores["Visie"] += 2;
    if (/\b(verwed|ik verwed|ik durf te wedden|ik weet zeker)\b/.test(t)) scores["Visie"] += 3;

    // PERSOONLIJK — eigen verhaal, verleden, leven buiten business
    if (/\b(mijn (man|kind|zoon|dochter|moeder|vader|ouders|gezin|huis|tuin|zwembad|vakantie|leven buiten))\b/.test(t)) scores["Persoonlijk"] += 5;
    if (/\b(vroeger|destijds|als kind|op school|mijn jeugd|jaren geleden|in \d{4})\b/.test(t)) scores["Persoonlijk"] += 3;
    if (/\b(persoonlijk|emotioneel|ik huilde|ik schaamde|ik was bang|ik twijfelde)\b/.test(t)) scores["Persoonlijk"] += 3;
    if (/\btoen ik\b/.test(t) && /\b(nog niet|nog geen|begon|startte|leerde)\b/.test(t)) scores["Persoonlijk"] += 2;

    // ROLMODEL — ik-verhaal over business zonder CTA, eigen resultaten/inzichten
    if (/^(ik |dit jaar |afgelopen jaar |vorig jaar )/.test(t) && /\b(omzet|verdien|mijn bedrijf|mijn resultaat|ik haalde|ik deed|ik realiseerde)\b/.test(t)) scores["Rolmodel"] += 4;
    if (/\b(dit jaar (komt|is|werd|draaide)|afgelopen jaar (deed|haalde|realiseerde))\b/.test(t)) scores["Rolmodel"] += 3;
    if (/^(ik |ik,)/.test(t) && scores["Klantverhaal"] < 3 && scores["Persoonlijk"] < 3) scores["Rolmodel"] += 1;

    // HELP — instructief, stappen, tips, hoe doe je X
    if (/\b(\d\s*(manieren|tips|stappen|redenen|fouten)|hoe je|zo doe je|zo werkt|stappenplan)\b/.test(t)) scores["Help"] += 4;
    if (/\b(tip:|stap \d|ten eerste|ten tweede|ten derde|als eerste|als tweede)\b/.test(t)) scores["Help"] += 3;
    if (/\b(formule|systeem|methode|aanpak|werkwijze|framework)\b/.test(t) && !/\b(mijn|ons)\b/.test(t)) scores["Help"] += 2;

    // HUB — verwijst naar extern platform
    if (/\b(podcast|blog|serie|aflevering|episode|youtube|link in bio|nieuwsbrief)\b/.test(t)) scores["Hub"] += 5;

    // Winnaar bepalen
    const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0];
    let contentType = winner[1] > 0 ? winner[0] : "Overig";

    // CTA / ManyChat detectie
    const heeftCTA      = /\b(comment|reageer|dm\b|stuur me|stuur een|meld je|wachtlijst|schrijf je in|klik op|link in bio|swipe up)\b/i.test(tekst);
    const heeftManyChat = /\bcomment\b.{0,40}\b(voor|om|en|krijg|dan|stuur)\b|\b(comment|reageer)\s+[A-Z]{2,}/i.test(tekst) || /\btype\b.{0,20}\b(hieronder|below|ja|yes)\b/i.test(tekst);

    // Hybride: klantverhaal MÉT activatie-CTA
    if (contentType === "Klantverhaal" && heeftCTA) contentType = "Klantverhaal + CTA";

    allePostsGescoord[allePostsGescoord.length - 1].contentType  = contentType;
    allePostsGescoord[allePostsGescoord.length - 1].heeftCTA     = heeftCTA;
    allePostsGescoord[allePostsGescoord.length - 1].heeftManyChat = heeftManyChat;

    // Haakje classificatie per post (voor kruisanalyse)
    const tk2 = tekst.toLowerCase().trim();
    let haakjeType = "Overig";
    if (/^ik\b/.test(tk2) && /\b(verwed|weet zeker|durf)\b/.test(tk2))            haakjeType = "Stellingname";
    else if (/^(ze|hij|mijn klant|een klant|toen ze|toen hij)/.test(tk2))          haakjeType = "Klantverhaal";
    else if (/\b(stop met|iedereen (zegt|denkt|doet)|de markt|waarheid)\b/.test(tk2)) haakjeType = "Confrontatie";
    else if (/^\d|^in \d{4}|^\d{4}/.test(tk2))                                    haakjeType = "Getal/resultaat";
    else if (/^(dit jaar|afgelopen jaar|vorig jaar)/.test(tk2) && /\b\d/.test(tk2)) haakjeType = "Resultaat-opener";
    else if (tk2.trim().startsWith("wat ") || tk2.trim().startsWith("hoe ") || tk2.trim().endsWith("?")) haakjeType = "Vraag";
    else if (/^ik\b/.test(tk2) && /\b(vroeger|destijds|toen ik|als kind)\b/.test(tk2)) haakjeType = "Persoonlijk ik-verhaal";
    else if (/^ik\b/.test(tk2))                                                    haakjeType = "Ik-verhaal";
    else if (/^(😱|🚨|⚡|🔥|💥)/.test(tekst.trim()))                              haakjeType = "Emoji-opener";

    allePostsGescoord[allePostsGescoord.length - 1].haakjeType = haakjeType;

    // Dag + uur
    const dt = tijdCol ? parseDate(r[tijdCol]) : null;
    if (dt) {
      const dag = dt.getDay(); // 0=zo
      const uur = dt.getHours();
      const week = `${dt.getFullYear()}-W${String(Math.ceil((dt - new Date(dt.getFullYear(),0,1)) / 604800000)).padStart(2,"0")}`;
      if (!dagStats[dag])  dagStats[dag]  = { bereik:0, saves:0, comments:0, count:0 };
      dagStats[dag].bereik += bereik; dagStats[dag].saves += saves;
      dagStats[dag].comments += comments; dagStats[dag].count += 1;
      if (!uurStats[uur])  uurStats[uur]  = { bereik:0, count:0 };
      uurStats[uur].bereik += bereik; uurStats[uur].count += 1;
      if (!weekStats[week]) weekStats[week] = 0;
      weekStats[week] += 1;
    }

    // Caption lengte
    const len = tekst.length;
    const cat = len < 150 ? "kort" : len < 400 ? "middel" : "lang";
    captionStats[cat].b += bereik; captionStats[cat].s += saves; captionStats[cat].n += 1;
  });

  const top10 = [...allePostsGescoord].sort((a, b) => b.score - a.score).slice(0, 10);

  // Haakje patroon analyse
  const top5 = top10.slice(0, 5);
  const haakjePatronen = {
    ik: top5.filter(p => /^ik\b/i.test(p.tekst.trim())).length,
    confrontatie: top5.filter(p => /\bstop met\b|\bje doet\b|\bje denkt\b|\bniet omdat\b|\bje probleem\b/i.test(p.tekst)).length,
    stelling: top5.filter(p => /^[A-Z][^?!.]{10,40}[.]/.test(p.tekst.trim()) || /\b(is niet|zijn niet|werkt niet|bestaat niet)\b/i.test(p.tekst)).length,
    klantverhaal: top5.filter(p => /\bze deed\b|\bze ging\b|\bze had\b|\bhij deed\b/i.test(p.tekst)).length,
    vraag: top5.filter(p => p.tekst.trim().endsWith("?") || p.tekst.trim().startsWith("Wat ") || p.tekst.trim().startsWith("Hoe ")).length,
  };
  const dominantPatroon = Object.entries(haakjePatronen).sort((a,b) => b[1]-a[1])[0];
  const patroonnamen = { ik: "ik-verhaal (rolmodel)", confrontatie: "confrontatie", stelling: "uitgesproken stelling", klantverhaal: "klantverhaal", vraag: "vraag" };

  // Content type verdeling
  const contentTypeStats = {};
  allePostsGescoord.forEach(p => {
    if (!contentTypeStats[p.contentType]) contentTypeStats[p.contentType] = { bereik:0, saves:0, count:0 };
    contentTypeStats[p.contentType].bereik += p.bereik;
    contentTypeStats[p.contentType].saves  += p.saves;
    contentTypeStats[p.contentType].count  += 1;
  });
  const contentTypeRanking = Object.entries(contentTypeStats)
    .map(([ct, s]) => ({ ct, gemBereik: Math.round(s.bereik/s.count), gemSaves: +(s.saves/s.count).toFixed(1), count: s.count }))
    .sort((a,b) => b.gemBereik - a.gemBereik);

  // Dag ranking
  const dagRanking = Object.entries(dagStats)
    .map(([dag, s]) => ({ dag: DAGEN_NL[+dag], dagNr: +dag, gemBereik: Math.round(s.bereik/s.count), gemSaves: +(s.saves/s.count).toFixed(1), count: s.count }))
    .sort((a, b) => b.gemBereik - a.gemBereik);

  // Beste uren (top 3)
  const uurRanking = Object.entries(uurStats)
    .filter(([, s]) => s.count >= 2)
    .map(([uur, s]) => ({ uur: +uur, gemBereik: Math.round(s.bereik/s.count), count: s.count }))
    .sort((a, b) => b.gemBereik - a.gemBereik)
    .slice(0, 3);

  // Consistentie
  const wekenMetPosts = Object.values(weekStats);
  const gemPostsPerWeek = wekenMetPosts.length ? +(wekenMetPosts.reduce((a,b)=>a+b,0) / wekenMetPosts.length).toFixed(1) : 0;
  const maxPostsPerWeek = Math.max(...wekenMetPosts);
  const minPostsPerWeek = Math.min(...wekenMetPosts);

  // Caption
  const captionAdvies = Object.entries(captionStats)
    .filter(([,v]) => v.n > 0)
    .map(([cat, v]) => ({ cat, label: cat === "kort" ? "Kort (<150 tekens)" : cat === "middel" ? "Middel (150-400)" : "Lang (400+)", gemBereik: Math.round(v.b/v.n), gemSaves: +(v.s/v.n).toFixed(1), count: v.n }))
    .sort((a, b) => b.gemBereik - a.gemBereik);

  // Haakje kruisanalyse — per haakje-type: gem bereik, saves, count
  const haakjeStats = {};
  allePostsGescoord.forEach(p => {
    const ht = p.haakjeType || "Overig";
    if (!haakjeStats[ht]) haakjeStats[ht] = { bereik:0, saves:0, comments:0, count:0 };
    haakjeStats[ht].bereik   += p.bereik;
    haakjeStats[ht].saves    += p.saves;
    haakjeStats[ht].comments += p.comments;
    haakjeStats[ht].count    += 1;
  });
  const haakjeRanking = Object.entries(haakjeStats)
    .filter(([, s]) => s.count >= 2)
    .map(([ht, s]) => ({
      ht,
      gemBereik:   Math.round(s.bereik / s.count),
      gemSaves:    +(s.saves / s.count).toFixed(1),
      gemComments: +(s.comments / s.count).toFixed(1),
      count: s.count,
    }))
    .sort((a, b) => b.gemBereik - a.gemBereik);

  // CTA / ManyChat statistieken
  const ctaStats = {
    metCTA:      allePostsGescoord.filter(p => p.heeftCTA),
    zonderCTA:   allePostsGescoord.filter(p => !p.heeftCTA),
    metManyChat: allePostsGescoord.filter(p => p.heeftManyChat),
  };
  const ctaVergelijking = {
    metCTA:    ctaStats.metCTA.length > 0    ? { count: ctaStats.metCTA.length,    gemBereik: Math.round(ctaStats.metCTA.reduce((a,p)=>a+p.bereik,0)    / ctaStats.metCTA.length),    gemSaves: +(ctaStats.metCTA.reduce((a,p)=>a+p.saves,0)    / ctaStats.metCTA.length).toFixed(1)    } : null,
    zonderCTA: ctaStats.zonderCTA.length > 0 ? { count: ctaStats.zonderCTA.length, gemBereik: Math.round(ctaStats.zonderCTA.reduce((a,p)=>a+p.bereik,0) / ctaStats.zonderCTA.length), gemSaves: +(ctaStats.zonderCTA.reduce((a,p)=>a+p.saves,0) / ctaStats.zonderCTA.length).toFixed(1) } : null,
    metManyChat: ctaStats.metManyChat.length > 0 ? { count: ctaStats.metManyChat.length, gemBereik: Math.round(ctaStats.metManyChat.reduce((a,p)=>a+p.bereik,0) / ctaStats.metManyChat.length), gemSaves: +(ctaStats.metManyChat.reduce((a,p)=>a+p.saves,0) / ctaStats.metManyChat.length).toFixed(1) } : null,
  };

  const gemBereikTotaal = Math.round(totBereik / rows.length);
  const gemSavesTotaal  = +(totSaves / rows.length).toFixed(1);

  // ── VERBANDEN ANALYSE — waarom werkten de top posts? ──────────────────────
  const verbanden = top10.slice(0, 5).map((post, i) => {
    const inzichten = [];

    // Haakje patroon
    const tk = post.tekst.toLowerCase();
    let haakje = "onbekend haakje";
    if (/^ik\b/.test(tk)) haakje = "Ik-verhaal (jij als rolmodel)";
    else if (/^(ze|hij|mijn klant|een klant|toen ze|toen hij)/.test(tk)) haakje = "Klantverhaal (bewijs vóór belofte)";
    else if (/\b(stop met|iedereen|de markt|waarheid|illusie|verwed)\b/.test(tk)) haakje = "Confrontatie / stelling";
    else if (/\bhoe (je|jij)|stap \d|\d (tips|manieren|stappen)/.test(tk)) haakje = "How-to / instructief";
    else if (tk.trim().endsWith("?")) haakje = "Openingsvraag";
    else if (/^(dit jaar|afgelopen|vorig jaar)/.test(tk)) haakje = "Resultaat-opener";

    // Content type verklaring
    const ctVerklaring = {
      "Klantverhaal": "Klantverhalen bouwen vertrouwen — mensen zien zichzelf in de klant.",
      "HOT Lead": "Directe actie-content scoort op bereik als de haak scherp is.",
      "Visie": "Standpunt-content polariseert en trekt de juiste mensen aan.",
      "Persoonlijk": "Persoonlijk maakt je menselijk — lage drempel om te reageren.",
      "Rolmodel": "Eigen resultaten als bewijs werkt als je al autoriteit hebt.",
      "Help": "Help-content wordt opgeslagen — hoge save-waarde.",
      "Hub": "Hub-content scoort minder op bereik maar converteert warm publiek.",
      "Overig": "Geen duidelijk patroon — kijk naar de haak zelf.",
    };

    // Performance profiel
    const bereikRatio  = gemBereikTotaal > 0 ? Math.round((post.bereik / gemBereikTotaal) * 10) / 10 : 1;
    const savesRatio   = gemSavesTotaal  > 0 ? Math.round((post.saves  / gemSavesTotaal)  * 10) / 10 : 1;

    if (bereikRatio > 2)   inzichten.push(`${bereikRatio}× meer bereik dan jouw gemiddelde — deze haak trok nieuwe mensen aan.`);
    if (savesRatio > 2)    inzichten.push(`${savesRatio}× meer saves dan gemiddeld — mensen bewaarden dit actief. Dit is expertise-content of iets dat ze willen onthouden.`);
    if (post.comments > 5) inzichten.push(`${post.comments} reacties — dit raakte iets. Interactie op deze schaal betekent dat mensen zich herkenden of iets wilden zeggen.`);
    if (bereikRatio > 1.5 && savesRatio > 1.5) inzichten.push("Dubbel sterk: bereik én saves. Dit is jouw sweetspot-format.");
    if (bereikRatio < 1.2 && savesRatio > 2) inzichten.push("Laag bereik, hoog saves — dit scoorde niet viraal maar werd wél bewaard. Waardevol voor warm publiek.");

    return {
      rank: i + 1,
      haakje,
      contentType: post.contentType,
      ctVerklaring: ctVerklaring[post.contentType] || "",
      bereik: post.bereik,
      saves: post.saves,
      comments: post.comments,
      bereikRatio,
      savesRatio,
      inzichten,
      tekst: post.tekst,
      type: post.type,
    };
  });

  const n = rows.length;
  const typeRanking = Object.entries(typeStats)
    .map(([type, s]) => ({ type, gemBereik: Math.round(s.bereik/s.count), gemSaves: +(s.saves/s.count).toFixed(1), gemComments: +(s.comments/s.count).toFixed(1), count: s.count }))
    .sort((a, b) => b.gemBereik - a.gemBereik);

  const besteBereik     = typeRanking[0];
  const besteEngagement = [...typeRanking].sort((a,b) => (b.gemSaves+b.gemComments)-(a.gemSaves+a.gemComments))[0];

  return {
    aantalPosts: n,
    gemBereik:   gemBereikTotaal,
    gemSaves:    gemSavesTotaal,
    gemComments: +(totComments / n).toFixed(1),
    typeRanking, besteBereik, besteEngagement, topPost, top10,
    dagRanking, uurRanking,
    consistentie: { gemPerWeek: gemPostsPerWeek, max: maxPostsPerWeek, min: minPostsPerWeek, weken: weekStats },
    captionAdvies,
    haakjePatronen, dominantPatroon, patroonnamen,
    contentTypeRanking,
    verbanden,
    haakjeRanking,
    ctaVergelijking,
  };
}

                            </div>
                          ))}
                          <div style={{ color: B.sub, fontFamily: "sans-serif", fontSize: 11, marginTop: 4, fontStyle: "italic" }}>{v.ctVerklaring}</div>

              const maxS = Math.max(...resultaat.haakjeRanking.map(x => x.gemSaves)) || 1;
              const bereikTop = resultaat.haakjeRanking[0];
              const savesTop  = [...resultaat.haakjeRanking].sort((a,b) => b.gemSaves - a.gemSaves)[0];

              resultaat.top10.forEach(p => {

                  const eersteZin = p.tekst.replace(/\n/g, " ").trim().split(/(?<=[.!?])\s/)[0].slice(0, 80);

                  ))}
                </div>
                <div style={{ display: "flex", gap: 20, flexWrap: "wrap", marginBottom: 14 }}>
                  {[
                    ["Gemiddeld/week", resultaat.consistentie.gemPerWeek, "streef naar dit als jouw ritme"],
                    ["Meeste in 1 week", resultaat.consistentie.max, "piekweek"],
                    ["Minste in 1 week", resultaat.consistentie.min, "rustigste week"],
                  ].map(([l, v, sub]) => (
                    <div key={l}>
                      <div style={{ color: B.tekst, fontFamily: "sans-serif", fontSize: 22, fontWeight: 700 }}>{v}</div>
                      <div style={{ color: B.goud, fontFamily: "sans-serif", fontSize: 11, fontWeight: 700 }}>{l}</div>
                      <div style={{ color: B.sub, fontFamily: "sans-serif", fontSize: 11 }}>{sub}</div>
                    </div>
                  ))}
                </div>
                <div style={{ background: B.goud + "10", border: `1px solid ${B.goud}33`, borderRadius: 4, padding: "10px 14px" }}>
                  <div style={{ color: B.tekst, fontFamily: "sans-serif", fontSize: 13, lineHeight: 1.6 }}>
                    {resultaat.consistentie.max > resultaat.consistentie.gemPerWeek * 2
                      ? `Jouw ritme schommelt sterk (van ${resultaat.consistentie.min} naar ${resultaat.consistentie.max} posts). ${resultaat.consistentie.gemPerWeek}x per week elke week is sterker dan pieken en dalen.`
                      : `Jouw ritme is redelijk consistent. ${resultaat.consistentie.gemPerWeek}x per week is jouw natuurlijke tempo — bouw daar je planning op.`
                    }
                  </div>
                </div>
              </div>
            )}

            {/* ── VOLGENDE STAP ── */}
            <div style={{ background: B.bordeaux, borderRadius: 6, padding: "20px 22px", textAlign: "center" }}>
              <div style={{ color: B.goudLight, fontSize: 11, letterSpacing: 2, fontFamily: "sans-serif", marginBottom: 8 }}>VOLGENDE STAP</div>
              <div style={{ color: B.creme, fontSize: 16, fontWeight: 700, marginBottom: 6 }}>Les 2 — Visibility Code Dashboard</div>
              <div style={{ color: B.creme + "aa", fontFamily: "sans-serif", fontSize: 13, lineHeight: 1.6 }}>
                Op basis van deze analyse bouw je in de volgende sessie jouw persoonlijke content-dashboard. Jouw ritme, jouw swipe file, jouw systeem.
              </div>
            </div>

          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(VisibilityAnalyse));
    </script>
  </body>
